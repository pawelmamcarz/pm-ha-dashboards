      prog2_time: select.deye_inverter_time_of_use_2_start
      prog3_time: select.deye_inverter_time_of_use_3_start
      prog5_time: select.deye_inverter_time_of_use_5_start
      prog6_time: select.deye_inverter_time_of_use_6_start
      prog1_capacity: number.deye_inverter_time_of_use_1_soc
      prog4_capacity: number.deye_inverter_system_mode_soc_time4
      prog1_charge: switch.deye_inverter_time_of_use_1_charge_enable
      prog2_charge: switch.deye_inverter_time_of_use_2_charge_enable
      prog3_charge: switch.deye_inverter_time_of_use_3_charge_enable
      prog4_charge: switch.deye_inverter_time_of_use_4_charge_enable
      prog5_charge: switch.deye_inverter_time_of_use_5_charge_enable
      prog6_charge: switch.deye_inverter_time_of_use_6_charge_enable
      max_sell_power: number.deye_inverter_max_sell_power
      day_load_energy_84: sensor.deye_inverter_daily_load_consumption
      load_power_L1: sensor.deye_inverter_load_l1_power
      load_power_L2: sensor.deye_inverter_load_l2_power
      solar_sell_247: switch.deye_inverter_solar_sell
      inverter_voltage_L2: sensor.deye_inverter_output_l2_voltage
      inverter_current_L2: sensor.deye_inverter_output_l2_current
      prog2_capacity: number.deye_inverter_time_of_use_2_soc
      prog3_capacity: number.deye_inverter_time_of_use_3_soc
      prog5_capacity: number.deye_inverter_time_of_use_5_soc
      prog6_capacity: number.deye_inverter_time_of_use_6_soc
      grid_ct_power_total: sensor.deye_inverter_grid_power
      grid_ct_power_172: sensor.deye_inverter_grid_l1_power
      grid_ct_power_L2: sensor.deye_inverter_grid_l2_power
      total_pv_generation: sensor.deye_inverter_total_pv_production
      pv1_power_186: sensor.inwerter_moc_czynna_pv_1
      load_power_L3: sensor.deye_inverter_load_l3_power
      grid_ct_power_L3: sensor.deye_inverter_grid_l3_power
      pv1_voltage_109: sensor.inwerter_napiecie_pv_1
      pv2_voltage_113: sensor.inwerter_napiecie_pv_3
      pv1_current_112: sensor.inwerter_prad_pv_1
      pv2_current_112: sensor.inwerter_prad_pv_3
      pv1_power_187: sensor.inwerter_moc_czynna_pv_1
      pv2_power_188: sensor.inwerter_moc_czynna_pv_3
      day_pv_energy_108: sensor.inwerter_dzienna_produkcja
      pv_total: sensor.inwerter_moc_czynna
      pv2_power_187: sensor.inwerter_moc_czynna_pv_3
      inverter_current_L3: sensor.deye_inverter_output_l3_current
      inverter_voltage_L3: sensor.deye_inverter_output_l3_voltage
      essential_load1: sensor.tesla_wall_connector_moc
      essential_load1_extra: sensor.myszeczka_battery_cache
    dynamic_line_width: true
    wide: true
    show_battery: true
    show_grid: true
    decimal_places: 1
    card_width: 100%
    center_no_grid: false
    view_layout:
      grid-area: flow
  - type: custom:plotly-graph
    view_layout:
      grid-area: graph
    entities:
    - entity: sensor.deye_inverter_pv_power
      name: "$fn ({ ys,meta }) =>\n  \"Solar\" + \"\U0001F506\" + \"(\" +ys[ys.length - 1]+\"W)\"\n"
      fill: tozeroy
      line:
        color: rgb(255, 155, 48)
        shape: spline
    - entity: sensor.deye_inverter_output_power
      name: "$fn ({ ys,meta }) =>\n  \"Load\" + \"⚡\" + \"(\" +ys[ys.length - 1]+\"W)\"\n"
      fill: tozeroy
      line:
        color: rgb(95, 182, 173)
        shape: spline
    - entity: sensor.deye_inverter_grid_power
      name: "$fn ({ ys,meta }) =>\n  \"Grid\" + \"\U0001F4A1\" + \"(\" +ys[ys.length - 1]+\"W)\"\n"
      fill: tozeroy
      line:
        color: rgb(84, 144, 194)
        shape: spline
    - entity: sensor.deye_inverter_battery_power
      fill: tozeroy
      name: "$fn ({ ys,meta }) =>\n  \"Battery\" + \"\U0001F50B\" + \"(\" +ys[ys.length - 1]+\"W)\"\n"
      line:
        color: rgb(243, 179, 202)
        shape: spline
    - entity: sensor.deye_inverter_battery
      name: "$fn ({ ys,meta }) =>\n  \"SOC\" + \"⚠️\" + \"(\" +ys[ys.length - 1]+\"%)\"\n"
      yaxis: y2
      line:
        color: red
        width: 1
        shape: spline
      fill: none
      filters:
      - sliding_window_moving_average:
          window_size: 1
          extended: true
    - entity: sensor.temp_avg_c
      name: "$fn ({ ys,meta }) =>\n  \"Temp\" + \"\U0001F321️\" + \"(\" +ys[ys.length - 1]+\"°C)\"\n"
      yaxis: y2
      line:
        color: rgb(255, 99, 132)
        width: 2
        shape: spline
      fill: none
    hours_to_show: 24
    refresh_interval: 60
    title: Moc w czasie rzeczywistym
    defaults:
      entity:
        show_value: false
      yaxes:
        fixedrange: true
    layout:
      legend:
        bgcolor: rgba(0,0,0,0)
        itemsizing: constant
        font:
          size: 11
      yaxis2:
        range:
        - 20
        - 105
        fixedrange: true
      yaxis:
        tickmode: linear
        dtick: 1000
    config:
      scrollZoom: false
  - type: custom:plotly-graph
    view_layout:
      grid-area: daily
    entities:
    - entity: sensor.jesionowa_huawei_be6lealydsl5gqs8bigicahcdhga8sdn_total_current_day_energy
      name: "$fn ({ ys,meta }) =>\n  \"Solar\" + \"\U0001F506\" + \"(\" +ys[ys.length - 1]+\"kWh)\"\n"
      marker:
        color: rgb(255, 155, 48)
    - entity: sensor.deye_inverter_daily_load_consumption
      name: "$fn ({ ys,meta }) =>\n  \"Load\" + \"⚡\" + \"(\" +ys[ys.length - 1]+\"kWh)\"\n"
      marker:
        color: rgb(95, 182, 173)
    - entity: sensor.deye_inverter_daily_energy_bought
      name: "$fn ({ ys,meta }) =>\n  \"Grid Import\" + \"\U0001F4A1\" + \"(\" +ys[ys.length - 1]+\"kWh)\"\n"
      marker:
        color: rgb(84, 144, 194)
    - entity: sensor.deye_inverter_daily_battery_discharge
      name: "$fn ({ ys,meta }) =>\n  \"Battery Discharge\" + \"\U0001F5B1️\" + \"(\" +ys[ys.length - 1]+\"kWh)\"\n"
      marker:
        color: rgb(151, 90, 182)
    - entity: sensor.deye_inverter_daily_battery_charge
      name: "$fn ({ ys,meta }) =>\n  \"Battery Charge\" + \"\U0001F50B\" + \"(\" +ys[ys.length - 1]+\"kWh)\"\n"
      marker:
        color: yellow
    hours_to_show: 5d
    title: Energia dzienna (5 dni)
    refresh_interval: 120
    defaults:
      entity:
        statistic: state
        period: day
        type: bar
        texttemplate: '%{y}'
        filters:
        - filter: i>0
      yaxes:
        fixedrange: true
    fn: "$fn({getFromConfig, vars})=> {\n  const range = getFromConfig(\"visible_range\");\n  const width = range[1] - range[0];\n\
      \  vars.scroll = (label, p) => ({\n    args: [\n      {\n        layout: {\n          \"xaxis.range\": [range[0] + width*p,\
      \ range[1] + width*p],\n        }\n      }, {\n        transition: {\n          duration: 150,\n        }\n      }\n\
      \    ],\n    label,\n    method: \"animate\",\n  })\n  vars.zoom = (label, h) => ({\n    args: [\n      {\n        layout:\
      \ {\n          \"xaxis.range\": [Date.now()-1000*60*60*h, Date.now()],\n        }\n      }\n    ],\n    label,\n   \
      \ method: \"animate\",\n  })\n}\n"
    layout:
      updatemenus:
      - buttons:
        - $fn({vars}) => vars.zoom( '30d', 24*30)
        - $fn({vars}) => vars.zoom( '14d', 24*14)
        - $fn({vars}) => vars.zoom( '7d', 24*7)
        - $fn({vars}) => vars.scroll( ' <', -.5)
        - $fn({vars}) => vars.scroll( ' >', .5)
        direction: null
        active: -1
        pad:
          r: 10
          t: 10
        type: buttons
        x: 1
        xanchor: auto
        y: 1
        yanchor: auto
      legend:
        bgcolor: rgba(0,0,0,0)
        yanchor: bottom
        xanchor: left
        x: 0
        y: 1
        font:
          size: 11
      height: 410
    config:
      displayModeBar: false
      scrollZoom: false
    time_offset: 12h
  - type: custom:plotly-graph
    view_layout:
      grid-area: solar
    hours_to_show: 4d
    time_offset: 2.5d
    refresh_interval: auto
    entities:
    - entity: sensor.inwerter_moc_czynna
      name: Solar Power
      line:
        color: rgb(255, 155, 48)
        shape: spline
        width: 1
      fill: tozeroy
      fillcolor: rgba(255, 155, 48, 0.3)
      yaxis: y3
      show_value: false
      showlegend: false
    - entity: sensor.energy_production_today_2
      line:
        color: rgb(125, 125, 125)
        shape: spline
      fill: tozeroy
      filters:
      - fn: "({meta}) => {\n  const entries = Object.entries(meta.wh_period); \n  const xs = entries.map(([start, _]) => new\
          \ Date(start));\n  const ys = entries.map(([_, value]) => value);\n  return { xs, ys };\n}\n"
      yaxis: y1
      showlegend: true
    - entity: sensor.energy_production_tomorrow_2
      line:
        color: rgb(90,90,90)
        shape: spline
      fill: tozeroy
      filters:
      - fn: "({meta}) => {\n  const entries = Object.entries(meta.wh_period); \n  const xs = entries.map(([start, _]) => new\
          \ Date(start));\n  const ys = entries.map(([_, value]) => value);\n  return { xs, ys };\n}\n"
      yaxis: y1
    - entity: sensor.energy_production_d2
      line:
        color: rgb(50,50,50)
        shape: spline
      fill: tozeroy
      filters:
      - fn: "({meta}) => {\n  const entries = Object.entries(meta.wh_period); \n  const xs = entries.map(([start, _]) => new\
          \ Date(start));\n  const ys = entries.map(([_, value]) => value);\n  return { xs, ys };\n}\n"
      yaxis: y1
      showlegend: true
    - entity: sensor.deye_inverter_battery
      name: Battery
      line:
        color: red
        shape: spline
        width: 1
      yaxis: y2
      show_value: true
      showlegend: false
      visible: true
    - entity: ''
      name: Now
      yaxis: y9
      showlegend: false
      line:
        width: 2
        dash: dot
        color: aqua
      x: $ex [Date.now(), Date.now()]
      y:
      - 0
      - 1
    defaults:
      yaxes:
        fixedrange: true
    layout:
      height: 410
      margin:
        t: 55
        l: 50
      showlegend: false
      legend:
        x: 0.1
        y: -0.8
      yaxis2:
        range:
        - 20
        - 105
        fixedrange: true
      annotations:
      - text: "$fn ({hass}) =>\n  \"<span style='font-size: 24px;'><span style='color: orange'>\"\n  + Number(hass.states['sensor.energy_production_today_2'].state).toFixed(1)\
          \ + \"</span></span>kWh<br>\"\n  +  \"</span><span style=''>Forecast Today</span><br>\""
        xref: x domain
        yref: y domain
        xanchor: center
        yanchor: center
        x: 0.06
        y: 1.2
        showarrow: false
      - text: "$fn ({hass}) =>\n  \"<span style='font-size: 24px;'><span style='color: dodgerblue'>\"\n  + Number(hass.states['sensor.energy_production_today_remaining_2'].state).toFixed(1)\
          \ + \"</span></span>kWh<br>\"\n  +  \"</span><span style=''>Remaining</span><br>\""
        xref: x domain
        yref: y domain
        xanchor: center
        yanchor: center
        x: 0.28
        y: 1.2
        showarrow: false
      - text: "$fn ({hass}) =>\n  \"<span style='font-size: 24px;'><span style='color: '>\"\n  + Number(hass.states['sensor.energy_production_tomorrow_2'].state).toFixed(1)\
          \ + \"</span></span>kWh<br>\"\n  +  \"</span><span style=''>Forecast Tomorrow</span><br>\""
        xref: x domain
        yref: y domain
        xanchor: center
        yanchor: centre
        x: 0.5
        y: 1.2
        showarrow: false
      - text: "$fn ({hass}) =>\n  \"<span style='font-size: 24px;'><span style='color: white'>\"\n  + Number(hass.states['sensor.energy_production_d2'].state).toFixed(1)\
          \ + \"</span></span>kWh<br>\"\n  +  \"</span><span style=''>Forecast Day 2</span><br>\""
        xref: x domain
        yref: y domain
        xanchor: center
        yanchor: center
        x: 0.72
        y: 1.2
        showarrow: false
      - text: "$fn ({hass}) =>\n  \"<span style='font-size: 24px;'><span style='color: red'>\"\n  + Number(hass.states['sensor.deye_inverter_battery'].state)\
          \ + \"</span></span>%<br>\"\n  +  \"</span><span style=''>SOC</span><br>\""
        xref: x domain
        yref: y domain
        xanchor: center
        yanchor: center
        x: 0.94
        y: 1.2
        showarrow: false
    config:
      scrollZoom: false
  - type: custom:plotly-graph
    view_layout:
      grid-area: total
    entities:
    - entity: sensor.inwerter_calkowita_produkcja_energii
      name: "$fn ({ ys,meta }) =>\n  \"Solar\" + \"\U0001F506\" + \"(\" +ys[ys.length - 1]+\"kWh)\"\n"
      offset: $fn() => 1000*60*60*4.5
      marker:
        color: rgb(255, 155, 48)
    - entity: sensor.deye_inverter_total_consumption
      name: "$fn ({ ys,meta }) =>\n  \"Load\" + \"⚡\" + \"(\" +ys[ys.length - 1]+\"kWh)\"\n"
      offset: $fn() => 1000*60*60*7.5
      marker:
        color: rgb(95, 182, 173)
    - entity: sensor.deye_inverter_total_energy_bought
      name: "$fn ({ ys,meta }) =>\n  \"Grid Import\" + \"\U0001F4A1\" + \"(\" +ys[ys.length - 1]+\"kWh)\"\n"
      offset: $fn() => 1000*60*60*10.5
      marker:
        color: rgb(84, 144, 194)
    - entity: sensor.deye_inverter_total_battery_discharge
      name: "$fn ({ ys,meta }) =>\n  \"Bat Discharge\" + \"\U0001F5B1️\" + \"(\" +ys[ys.length - 1]+\"kWh)\"\n"
      offset: $fn() => 1000*60*60*13.5
      marker:
        color: rgb(151, 90, 182)
    - entity: sensor.deye_inverter_total_battery_charge
      name: "$fn ({ ys,meta }) =>\n  \"Bat Charge\" + \"\U0001F50B\" + \"(\" +ys[ys.length - 1]+\"kWh)\"\n"
      offset: $fn() => 1000*60*60*16.5
      marker:
        color: yellow
    hours_to_show: current_day
    defaults:
      entity:
        statistic: state
        period: day
        type: bar
        width: $fn() => 1000*60*60*3
        texttemplate: '%{y}'
      yaxes:
        fixedrange: true
    title: Statystyki dnia
    layout:
      xaxis:
        nticks: 1
      height: 410
    config:
      displayModeBar: false
      scrollZoom: false
    refresh_interval: 60
  - type: custom:plotly-graph
    view_layout:
      grid-area: stats
    title: Generation Purpose
    entities:
    - entity: sensor.deye_inverter_output_power
      type: pie
      hole: 0.6
      values: "$ex [ hass.states[\"sensor.deye_inverter_daily_battery_charge\"].state, hass.states[\"sensor.deye_inverter_output_power\"\
        ].state\n ]"
      marker:
        colors:
        - rgb(84, 144, 194)
        - rgb(95, 182, 173)
      textinfo: value+percent
    hours_to_show: 1
    refresh_interval: auto
    layout:
      height: 390
      margin:
        t: 60
      showlegend: false
      annotations:
      - text: "$fn ({hass}) =>\n  \"<span style='font-size: 24px;'><span style='color: rgb(84, 144, 194)'>\"\n  + Number(hass.states['sensor.deye_inverter_daily_battery_charge'].state).toFixed(1)\
          \ + \"</span></span>kWh<br>\"\n  +  \"</span><span style=''>Charging</span><br>\""
        xref: paper
        yref: paper
        xanchor: center
        yanchor: center
        x: 0.9
        y: 1.2
        showarrow: false
      - text: "$fn ({hass}) =>\n  \"<span style='font-size: 24px;'><span style='color: rgb(95, 182, 173)'>\"\n  + Number(hass.states['sensor.deye_inverter_daily_load_consumption'].state).toFixed(1)\
          \ + \"</span></span>kWh<br>\"\n  +  \"</span><span style=''>Consumption</span><br>\""
        xref: paper
        yref: paper
        xanchor: center
        yanchor: center
        x: 0.05
        y: 1.2
        showarrow: false
  - type: custom:plotly-graph
    view_layout:
      grid-area: stats1
    title: Generation Today
    entities:
    - entity: sensor.deye_inverter_daily_battery_charge
      type: pie
      hole: 0.6
      values: $ex [ hass.states["sensor.deye_inverter_daily_battery_discharge"].state, hass.states["sensor.deye_inverter_daily_energy_bought"].state,
        hass.states["sensor.jesionowa_huawei_be6lealydsl5gqs8bigicahcdhga8sdn_total_current_day_energy"].state ]
