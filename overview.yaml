      - Grid Offpeak
      - Solar
      marker:
        colors:
        - rgb(151, 90, 182)
        - rgb(84, 144, 194)
        - rgb(255, 155, 48)
      textinfo: value+percent
    hours_to_show: 1
    refresh_interval: auto
    layout:
      height: 410
      margin:
        t: 60
      showlegend: false
      annotations:
      - text: "$fn ({hass}) =>\n  \"<span style='font-size: 24px;'><span style='color: rgb(255, 155, 48'>\"\n  + Number(hass.states['sensor.jesionowa_huawei_be6lealydsl5gqs8bigicahcdhga8sdn_total_current_day_energy'].state).toFixed(1)\
          \ + \"</span></span>kWh<br>\"\n  +  \"</span><span style=''>Solar</span><br>\""
        xref: paper
        yref: paper
        xanchor: center
        yanchor: center
        x: 0.05
