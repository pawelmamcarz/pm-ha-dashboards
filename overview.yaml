    refresh_interval: auto
    fn: "$fn({hass, vars}) => {\n  vars.computeAll = () => {\n    const timeSlots = [\n      {start: 1, end: 2, cap: 1},\n\
      \      {start: 2, end: 3, cap: 2},\n      {start: 3, end: 4, cap: 3},\n      {start: 4, end: 5, cap: 4},\n      {start:\
      \ 5, end: 6, cap: 5},\n      {start: 6, end: 1, cap: 6}\n    ];\n\n    const now = new Date();\n    const xs = [];\n\
      \    const ys = [];\n\n    timeSlots.forEach(({start, end, cap}) => {\n      const startTimeString = hass.states[`time.deye_inverter_time_of_use_${start}_start`].state;\n\
      \      const endTimeString = hass.states[`time.deye_inverter_time_of_use_${end}_start`].state;\n      const capacity\
      \ = parseFloat(hass.states[`number.deye_inverter_time_of_use_${cap}_soc`].state);\n\n      const [startHours, startMinutes]\
      \ = startTimeString.split(':').map(Number);\n      const [endHours, endMinutes] = endTimeString.split(':').map(Number);\n\
      \n      const startTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), startHours, startMinutes);\n  \
      \    let endTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), endHours, endMinutes);\n\n      if (endTime\
      \ < startTime) {\n        endTime.setDate(endTime.getDate() + 1);\n      }\n\n      xs.push(startTime, endTime);\n \
      \     ys.push(capacity, capacity);\n    });\n\n    return { xs, ys };\n  }\n}\n"
