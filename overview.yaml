      inverter_power_175: sensor.deye_inverter_output_power
      grid_power_169: sensor.deye_inverter_grid_power
      battery_voltage_183: sensor.deye_inverter_battery_voltage
      battery_soc_184: sensor.deye_inverter_battery
      battery_power_190: sensor.deye_inverter_battery_power
      battery_current_191: sensor.deye_inverter_battery_current
      essential_load3: sensor.panasonic_heat_pump_consumption
      nonessential_power: none
      pv1_current_110: sensor.inwerter_prad_pv_1
      pv2_voltage_111: sensor.inwerter_napiecie_pv_2
      grid_connected_status_194: binary_sensor.deye_inverter_grid_connected_status
      aux_power_166: sensor.deye_inverter_generator_power_total
      prog4_time: number.deye_inverter_time_of_use_4_soc
      essential_load3_extra: none
      environment_temp: sensor.dom_realfeel_temperature
      essential_load2: sensor.panasonic_heat_pump_main_dhw_power_consumption
      battery_rated_capacity: number.deye_inverter_battery_capacity
      day_grid_import_76: sensor.deye_inverter_daily_energy_bought
      grid_voltage: sensor.deye_inverter_grid_l1_voltage
      battery_temp_182: sensor.deye_inverter_battery_temperature
      battery_soh: sensor.batt_soh
      battery_status: sensor.batt_state
      battery_current_direction: sensor.deye_inverter_battery_current
      remaining_solar: sensor.energy_production_today_remaining_2
      energy_cost_sell: sensor.cena_pradu
