- path: default_view
  title: Home
  cards:
  - type: vertical-stack
    cards:
    - type: markdown
      content: "## Jakość powietrza w Grodzisku Mazowieckim\n\n{% set pm1 = states('sensor.czujnik_powietrza_pm_1') %}\n{%\
        \ set pm25 = states('sensor.czujnik_powietrza_pm_25') %}\n{% set pm10 = states('sensor.czujnik_powietrza_pm_10') %}\n\
        {% set pm1_float = pm1|float(0) %}\n{% set pm25_float = pm25|float(0) %}\n{% set pm10_float = pm10|float(0) %}\n{%\
        \ set ostrzezenie_pm1 = pm1 not in ['unknown','unavailable'] and pm1_float > 20 %}\n{% set ostrzezenie_pm25 = pm25\
        \ not in ['unknown','unavailable'] and pm25_float > 25 %}\n{% set ostrzezenie_pm10 = pm10 not in ['unknown','unavailable']\
        \ and pm10_float > 50 %}\n{% if ostrzezenie_pm1 or ostrzezenie_pm25 or ostrzezenie_pm10 %}\n\U0001F6D1 **OSTRZEŻENIE:\
        \ Przekroczone normy pyłów!**\n{% endif %}\n\n- **PM1:** {{ pm1_float|round(1) }} µg/m³ {% if ostrzezenie_pm1 %} \U0001F6A8\
        \ {% endif %}\n- **PM2.5:** {{ pm25_float|round(1) }} µg/m³ {% if ostrzezenie_pm25 %} \U0001F6A8 {% endif %}\n- **PM10:**\
        \ {{ pm10_float|round(1) }} µg/m³ {% if ostrzezenie_pm10 %} \U0001F6A8 {% endif %}\n\n---\n{% if ostrzezenie_pm25\
        \ or ostrzezenie_pm10 %}\nZaleca się unikanie wychodzenia i aktywności na zewnątrz.  \nSzczególnie ważne dla dzieci,\
