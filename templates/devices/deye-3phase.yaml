# =============================================================================
# Deye 3-Phase Inverter - Entity Mapping
# =============================================================================
# Mapowanie encji Home Assistant dla falownika Deye 3-fazowego.
# Używane przez generate.py do generowania dashboardu.
# =============================================================================

inverter:
  model: deye
  three_phase: true

entities:
  # --- Moc i energia PV ---
  pv_power: "sensor.{{ prefix }}_pv_power"
  pv1_power: "sensor.{{ prefix }}_pv1_power"
  pv2_power: "sensor.{{ prefix }}_pv2_power"
  pv1_voltage: "sensor.{{ prefix }}_pv1_voltage"
  pv2_voltage: "sensor.{{ prefix }}_pv2_voltage"
  pv1_current: "sensor.{{ prefix }}_pv1_current"
  pv2_current: "sensor.{{ prefix }}_pv2_current"
  daily_pv_energy: "sensor.{{ prefix }}_daily_pv_production"
  total_pv_generation: "sensor.{{ prefix }}_total_pv_production"

  # --- Bateria ---
  battery_soc: "sensor.{{ prefix }}_battery"
  battery_power: "sensor.{{ prefix }}_battery_power"
  battery_voltage: "sensor.{{ prefix }}_battery_voltage"
  battery_current: "sensor.{{ prefix }}_battery_current"
  battery_temperature: "sensor.{{ prefix }}_battery_temperature"
  daily_battery_charge: "sensor.{{ prefix }}_daily_battery_charge"
  daily_battery_discharge: "sensor.{{ prefix }}_daily_battery_discharge"
  total_battery_charge: "sensor.{{ prefix }}_total_battery_charge"
  total_battery_discharge: "sensor.{{ prefix }}_total_battery_discharge"
  battery_shutdown_soc: "number.{{ prefix }}_battery_shutdown_soc"
  battery_capacity: "number.{{ prefix }}_battery_capacity"

  # --- Sieć ---
  grid_power: "sensor.{{ prefix }}_grid_power"
  grid_l1_power: "sensor.{{ prefix }}_grid_l1_power"
  grid_l2_power: "sensor.{{ prefix }}_grid_l2_power"
  grid_l3_power: "sensor.{{ prefix }}_grid_l3_power"
  grid_l1_voltage: "sensor.{{ prefix }}_grid_l1_voltage"
  grid_connected_status: "binary_sensor.{{ prefix }}_grid_connected_status"
  daily_energy_bought: "sensor.{{ prefix }}_daily_energy_bought"
  daily_energy_sold: "sensor.{{ prefix }}_daily_energy_sold"
  total_energy_bought: "sensor.{{ prefix }}_total_energy_bought"
  total_consumption: "sensor.{{ prefix }}_total_consumption"

  # --- Obciążenie ---
  output_power: "sensor.{{ prefix }}_output_power"
  load_power: "sensor.{{ prefix }}_load_power"
  load_l1_power: "sensor.{{ prefix }}_load_l1_power"
  load_l2_power: "sensor.{{ prefix }}_load_l2_power"
  load_l3_power: "sensor.{{ prefix }}_load_l3_power"
  load_frequency: "sensor.{{ prefix }}_load_frequency"
  daily_load_consumption: "sensor.{{ prefix }}_daily_load_consumption"

  # --- Napięcia/prądy wyjściowe ---
  output_l1_voltage: "sensor.{{ prefix }}_output_l1_voltage"
  output_l2_voltage: "sensor.{{ prefix }}_output_l2_voltage"
  output_l3_voltage: "sensor.{{ prefix }}_output_l3_voltage"
  output_l1_current: "sensor.{{ prefix }}_output_l1_current"
  output_l2_current: "sensor.{{ prefix }}_output_l2_current"
  output_l3_current: "sensor.{{ prefix }}_output_l3_current"
  output_frequency: "sensor.{{ prefix }}_output_frequency"

  # --- Temperatury ---
  ac_temperature: "sensor.{{ prefix }}_ac_temperature"
  dc_transformer_temp: "sensor.{{ prefix }}_dc_transformer_temperature"

  # --- Status ---
  running_status: "sensor.{{ prefix }}_running_status"
  power_losses: "sensor.{{ prefix }}_power_losses"

  # --- Przełączniki sterowania ---
  power_switch: "switch.{{ prefix }}_power_switch"
  solar_sell: "switch.{{ prefix }}_solar_sell"
  energy_priority: "select.{{ prefix }}_energy_management_priority"
  force_off_grid: "switch.{{ prefix }}_force_off_grid"
  battery_grid_charging: "switch.{{ prefix }}_battery_grid_charging"
  battery_generator_charging: "switch.{{ prefix }}_battery_generator_charging"
  battery_wake_up: "switch.{{ prefix }}_battery_wake_up"
  time_of_use: "switch.{{ prefix }}_time_of_use"

  # --- Limity ---
  max_battery_charge_current: "number.{{ prefix }}_maximum_battery_charge_current"
  max_battery_discharge_current: "number.{{ prefix }}_maximum_battery_discharge_current"
  max_battery_grid_charge_current: "number.{{ prefix }}_maximum_battery_grid_charge_current"
  battery_shutdown_voltage: "number.{{ prefix }}_battery_shutdown_voltage"
  max_sell_power: "number.{{ prefix }}_max_sell_power"
  max_solar_power: "number.{{ prefix }}_max_solar_power"

  # --- Peak shaving ---
  grid_peak_shaving_enable: "switch.{{ prefix }}_grid_peak_shaving_enable"
  grid_peak_shaving_power: "number.{{ prefix }}_grid_peak_shaving_power"
  asymmetric_phase_feeding: "switch.{{ prefix }}_asymmetric_phase_feeding"

  # --- SmartLoad ---
  smartload_on_soc: "number.{{ prefix }}_smartload_on_soc"
  smartload_off_soc: "number.{{ prefix }}_smartload_off_soc"
  smartload_on_voltage: "number.{{ prefix }}_smartload_on_voltage"
  smartload_off_voltage: "number.{{ prefix }}_smartload_off_voltage"

  # --- MPPT ---
  mppt_multi_scanning: "switch.{{ prefix }}_mppt_multi_point_scanning"
  microinverter_export_cutoff: "switch.{{ prefix }}_microinverter_export_cut_off"

  # --- Generator ---
  generator: "switch.{{ prefix }}_generator"
  generator_grid_side: "switch.{{ prefix }}_generator_grid_side"
  generator_always_on: "switch.{{ prefix }}_generator_on_grid_always_on"
  generator_power_total: "sensor.{{ prefix }}_generator_power_total"

  # --- TOU (Time of Use) ---
  tou_enabled: "switch.{{ prefix }}_time_of_use"
  # Sloty TOU generowane dynamicznie w generate.py

  # --- Alarmy ---
  battery_alarm: "binary_sensor.{{ prefix }}_battery_alarm"
  battery_fault: "binary_sensor.{{ prefix }}_battery_fault"
  time_error: "binary_sensor.{{ prefix }}_communications_board_time_error"

  # --- Firmware ---
  firmware_version: "sensor.{{ prefix }}_device_main_firmware_version"
  hardware_version: "sensor.{{ prefix }}_device_arc_board_firmware_version"
